# =========================
# Hybrid CNN–Transformer Denoising Config
# =========================

dataset:
  name: BSD500
  root: data
  raw_dir: data/raw
  noisy_dir: data/noisy
  patch_size: 128        # smaller patches for faster training
  train_split: train
  val_split: val
  test_split: test
  augment: true

noise:
  gaussian:
    enabled: true
    sigma_values: [15, 25, 50]
  non_gaussian:
    enabled: true           # e.g., speckle, impulse
  mode: "gaussian"          # "gaussian", "non_gaussian", or "both"

model:
  type: "hybrid"            # hybrid / cnn / transformer
  base_channels: 48
  num_cnn_blocks: 17         # DnCNN depth
  num_transformer_blocks: [2, 2, 4, 4]  # Restormer depth per stage
  num_heads: [1, 2, 4, 8]
  expansion_factor: 2.0
  fusion_type: "gate"
  use_residual_learning: true

training:
  batch_size: 2
  num_workers: 4
  epochs: 100
  lr: 0.0003
  optimizer: "adamw"
  weight_decay: 0.01
  scheduler: "cosine"        # "step" or "cosine"
  lr_step: 30
  lr_gamma: 0.5
  loss_type: "charbonnier_ssim"
  save_checkpoint_dir: "experiments/checkpoints"
  log_dir: "experiments/logs"
  resume: false
  resume_path: ""

evaluation:
  metrics: ["psnr", "ssim"]
  save_images: true
  results_dir: "results/images"
  tables_dir: "results/tables"

inference:
  tile_size: 256        # for large images, optional tiling
  overlap: 16
  denoise_strength: 1.3  # >1.0 makes denoising more visible

device:
  use_gpu: true
  gpu_id: 0
  seed: 42
